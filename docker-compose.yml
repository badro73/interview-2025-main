version: "3.8"

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
    container_name: interview_php
    volumes:
      - ./:/app
    depends_on:
      - db

  nginx:
    image: nginx:1.25-alpine
    container_name: interview_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - rabbitmq
  db:
    image: mysql:8.0
    container_name: interview_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d

    # Nouveau : Le worker qui traite les messages en local
  messenger-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
    container_name: interview_worker
    volumes:
      - ./:/app
    # Cette commande lance le consommateur Symfony
    command: php bin/console messenger:consume async -vv
    depends_on:
      - db
      - rabbitmq

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: interview_rabbitmq
    ports:
      - "5672:5672"   # Port AMQP
      - "15672:15672" # Interface Web (guest/guest)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  db_data:
  rabbitmq_data:
