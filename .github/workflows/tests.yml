name: Run tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [ 8.3 ]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: app_test
          MYSQL_USER: app
          MYSQL_PASSWORD: app
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: bcmath, intl, pdo_mysql, zip, mbstring
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-

      - name: Install Composer dependencies
        run: composer install --no-progress --no-interaction --optimize-autoloader

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot >/dev/null 2>&1; then
              echo "MySQL is up!"
              exit 0
            fi
            echo "Waiting for MySQL ($i/30)..."
            sleep 2
          done

      - name: Setup .env.test
        run: |
          echo "DATABASE_URL=mysql://app:app@127.0.0.1:3306/app?serverVersion=8.0&charset=utf8mb4" > .env.test

      - name: Run migrations
        run: php bin/console doctrine:migrations:migrate --env=test -n

      - name: Run PHPUnit
        run: vendor/bin/phpunit

      - name: Run Behat
        run: vendor/bin/behat --format=progress --colors
  deploy:
    name: Build & Deploy to ECS
    needs: test
    runs-on: ubuntu-latest
    # Condition : Uniquement si on est sur la branche main (après un merge)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
          IMAGE_TAG: latest
        run: |
          # On build en utilisant ton Dockerfile multi-stage (cible 'prod')
          docker build --target prod -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f docker/php/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update ECS Service
        run: |
          # On force le service ECS à tirer la nouvelle image du garage (ECR)
          aws ecs update-service --cluster symfony-api-cluster --service symfony-api-back-service --force-new-deployment

      - name: Run Database Migrations
        run: |
          TASK_ARN=$(aws ecs list-tasks --cluster symfony-api-cluster --service symfony-api-back-service --query 'taskArns[0]' --output text)
          aws ecs execute-command --cluster symfony-api-cluster \
          --task $TASK_ARN \
          --container php-app \
          --interactive \
          --command "php bin/console doctrine:migrations:migrate --no-interaction"
